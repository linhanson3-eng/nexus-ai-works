name: package-pipeline
description: 封装交付 — 构建+打包 → 冒烟测试验证 → 修复 → 确认。将各阶段产出组装为可部署制品，验证开箱即用。
workspace: demo

nodes:
  # ═══ Phase 1: 构建 + 打包 ═══

  - id: builder
    label: 构建打包
    agent_name: demo
    prompt: |
      你是构建工程师。将项目构建并打包为可部署的制品。

      ## 工作流程
      1. 检查项目结构：依赖是否完整、配置文件是否正确、构建脚本是否可用
      2. 安装依赖、运行构建（npm build / pip install / go build / docker build）
      3. 修复构建错误（如有）
      4. 打包制品：Docker 镜像 / .tar.gz / 静态文件目录
      5. 生成部署说明

      ## 输出
      ### 构建结果
      - 构建命令和耗时
      - 制品路径和大小
      - 构建过程中的警告和修复记录

      ### 制品清单
      | 文件 | 大小 | 说明 |
      |------|------|------|

      ### 部署说明
      - 环境要求（Node/Python/Go 版本、系统依赖）
      - 启动命令
      - 配置项（环境变量、配置文件）
      - 健康检查端点
    expected_output: 构建结果 + 制品清单 + 部署说明（直接输出，不要写入文件）
    timeout_seconds: 900
    depends_on: []

  # ═══ Phase 2: 冒烟测试 ═══

  - id: smoke_test
    label: 冒烟验证
    agent_name: demo
    prompt: |
      你是交付验证工程师。对构建好的制品进行冒烟测试。

      ## 验证清单
      1. 启动服务/应用
      2. 健康检查端点返回正常
      3. 核心 API 能正常响应
      4. 静态资源可访问
      5. 数据库连接正常
      6. 关键页面可加载（如有前端）

      ## 输出
      | # | 验证项 | 结果 | 耗时 | 备注 |
      |---|--------|------|------|------|

      ### 发现的问题
      （如有，逐条列出）

      冒烟结论：
      - 全部通过：输出「通过」
      - 有问题：输出「不通过：{问题列表}」
    expected_output: 冒烟测试报告（通过/不通过 + 问题列表）
    gate:
      type: review
    depends_on:
      - builder

  # ═══ Phase 3: 修复 + 确认 ═══

  - id: fix
    label: 修复打包问题
    agent_name: demo
    prompt: |
      根据冒烟测试发现的问题修复打包。

      ## 规则
      1. 启动失败 → 检查依赖、配置、端口
      2. 功能异常 → 检查构建产物是否完整
      3. 每修一条输出：「问题 N [已修复]：{改动说明}」
      4. 修复后重新验证
    expected_output: 逐条修复状态 + 修改说明
    timeout_seconds: 600
    depends_on:
      - smoke_test

  - id: confirm
    label: 确认交付
    agent_name: demo
    prompt: |
      重新冒烟验证，确认交付物达标。

      ## 验证
      1. 重新运行冒烟测试全部检查项
      2. 对照部署说明验证步骤是否完整可执行
      3. 确认没有遗漏的配置或依赖

      ## 输出
      | # | 检查项 | 结果 | 备注 |
      |---|--------|------|------|

      交付结论：
      - 全部通过且部署说明可执行：输出「通过」
      - 有问题：输出「不通过：{未解决问题}」
    expected_output: 交付确认（通过 / 不通过 + 逐条验证结果）
    gate:
      type: review
    depends_on:
      - fix

max_total_seconds: 1800
