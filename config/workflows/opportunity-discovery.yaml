name: opportunity-discovery
description: 商机发现 · 蜂群扫描 — 4 路深度情报源并行 → 交叉验证 → 商机简报。每个 scout 是完整情报分析师，支持多跳搜索和来源验证。
workspace: demo

nodes:
  # ═══ Phase 1: 4 路情报源并行扫描 ═══

  - id: market_intel
    label: 市场情报
    agent_name: demo
    prompt: |
      你是市场情报分析师。你的任务是通过网络搜索，发现目标领域的商机信号。

      ## 方法
      搜索行业新闻、投融资动态、竞品情报。对关键线索深读原文、交叉验证（同一信息至少 2 个独立来源）。

      ## 输出（每个信号）
      - 信号描述 | 强度(强/中/弱) | 可行动方向 | 时间窗口 | 置信度(高/中/低)
      - 标注信息来源 URL，区分"已查证事实"和"推断"，数据不足则明确标注
    expected_output: 市场情报扫描报告（至少 2 个信号，每个含来源 URL、强度、置信度。直接输出，不要写入文件）
    timeout_seconds: 600
    depends_on: []

  - id: demand_intel
    label: 需求情报
    agent_name: demo
    prompt: |
      你是用户需求情报分析师。你的任务是从公开信息中识别未被满足的用户需求。

      ## 方法
      搜索社交媒体趋势、招聘信息变化、用户投诉和问答社区。对关键线索深读原文，提取用户原话。

      ## 输出（每个信号）
      - 需求描述(谁/场景/问题) | 付费意愿(高/中/低) | 现有方案满足度 | 产品机会
      - 引用用户原话或具体数据，标注来源 URL，区分"观察到的事实"和"推断"
    expected_output: 需求情报扫描报告（至少 2 个信号，每个含来源 URL、付费意愿、现有方案分析。直接输出，不要写入文件）
    timeout_seconds: 600
    depends_on: []

  - id: policy_intel
    label: 政策情报
    agent_name: demo
    prompt: |
      你是政策法规情报分析师。你的任务是从政策变化中识别合规风险和制度红利。

      ## 方法
      搜索最新行业监管政策、产业扶持政策、行业标准更新。读摘要和分析文章即可，不要抓取政策全文（全文太长会撑爆上下文）。关注政策的核心影响而非具体条款原文。

      ## 输出（每个信号）
      - 政策名称/变化(含文件号或公告 URL) | 影响范围 | 风险 or 机遇 | 时间窗口 | 应对建议
      - 引用政策原文 URL，区分"明确政策变化"和"趋势预测"
    expected_output: 政策情报扫描报告（至少 1 个信号，含政策文件来源。直接输出，不要写入文件）
    timeout_seconds: 600
    depends_on: []

  - id: tech_intel
    label: 技术情报
    agent_name: demo
    prompt: |
      你是技术趋势情报分析师。你的任务是从技术社区和开源项目中识别技术方向变化。

      ## 方法
      搜索开源社区趋势(GitHub trending)、技术博客和论文、技术会议和行业报告。对关键项目分析 star 趋势、contributor 活跃度。

      ## 输出（每个信号）
      - 技术/项目名称 | 增长指标(具体数字) | 商业应用场景 | 技术成熟度(实验/早期/成熟) | 可参考方向
      - 标注数据来源 URL，区分"技术趋势事实"和"商业化前景推测"
    expected_output: 技术情报扫描报告（至少 1 个信号，含具体增长数据和来源。直接输出，不要写入文件）
    timeout_seconds: 600
    depends_on: []

  # ═══ Phase 2: 跨源交叉验证 ═══

  - id: cross_validator
    label: 交叉验证
    agent_name: demo
    prompt: |
      你是情报审核员。你的任务是对 4 路情报源进行交叉验证和去重。

      ## 任务
      1. 去重：不同情报源报告了同一个信号 → 合并为一个，标记"多源交叉确认"
      2. 验证：对每条信号，检查来源 URL 是否可访问、信息是否一致
      3. 冲突检测：不同情报源对同一件事的结论不一样 → 标记矛盾
      4. 信息缺口：哪些关键问题 4 个情报源都没有覆盖？

      ## 输出格式
      | # | 信号 | 来源数 | 交叉验证 | 信号强度 | 冲突标记 |
      |---|------|--------|---------|---------|---------|
      | 1 | ... | 2 (市场+需求) | 一致 | 强 | - |
      | 2 | ... | 1 (技术) | 未交叉验证 | 中 | - |

      然后输出：
      - 矛盾信号（如有）
      - 信息缺口（4 路都没覆盖到的）
      - 综合可信度评估
    expected_output: 交叉验证报告（去重信号表 + 矛盾标记 + 信息缺口）
    timeout_seconds: 300
    depends_on:
      - market_intel
      - demand_intel
      - policy_intel
      - tech_intel

  # ═══ Phase 3: 商机简报 ═══

  - id: synthesizer
    label: 商机简报生成
    agent_name: demo
    prompt: |
      你是商机情报总编。基于交叉验证后的情报，生成一份可行动的商机简报。

      ## 输出格式

      # 商机简报 — {当前日期}

      ## 执行摘要
      （100 字以内：今日最重要的发现是什么，建议 CEO 关注什么）

      ## 今日重点信号 (Top 3)
      （最强的 3 个信号，每个 2-4 句话，含：是什么、为什么重要、建议做什么）

      ## 全源扫描概览
      | # | 来源 | 信号 | 强度 | 置信度 | 时间窗口 | 建议行动 |
      |---|------|------|------|--------|---------|---------|

      ## 本周值得持续关注
      （2-3 个不是今天最紧急但值得持续跟踪的方向）

      ## 立即行动
      （有紧迫性的信号，需要今天/本周处理的事项）

      ## 信息缺口与待验证项
      （当前数据不足、需要进一步确认的问题）

      ## 附录：信号来源清单
      （列出每条信号的信息来源 URL）

      ## 要求
      - 表格优先，便于快速浏览
      - 每个建议行动都要有负责人和时间预期
      - 标注置信度，不确定的要说"不确定"
    expected_output: 完整商机简报（含执行摘要、Top 3、全源概览、行动建议、来源清单）
    timeout_seconds: 600
    depends_on:
      - cross_validator

  # ═══ Phase 4: 质量门禁 ═══

  - id: reviewer
    label: 简报审查
    agent_name: demo
    prompt: |
      审查上游商机简报，按以下维度逐项检查：

      1. 信号可信度：每条信号是否有可查证的来源？有没有"看起来很厉害但来源模糊"的信号？
      2. 去重是否彻底：有没有同一信号以不同描述出现两次？
      3. 优先级是否合理：Top 3 真的是最重要的 3 个吗？有没有紧急且重要的信号被排低了？
      4. 行动建议是否可执行："关注 XX 赛道"不是行动建议，"下周一前调研 XX 公司的 YY 产品"才是
      5. 信息缺口是否诚实：该说"不知道"的地方有没有强行给结论？

      审查结论格式：
      - 全部通过：输出「通过」
      - 有问题：输出「不通过」并逐条列出问题，每条标注严重级别：
        【致命】假信号、来源不可查证、关键信号遗漏
        【严重】优先级排序错误、行动建议不具体、信息缺口未标注
        【建议】措辞不够精确、格式不规范
    expected_output: 审查结论（通过 / 不通过 + 逐条问题 + 严重级别）
    gate:
      type: review
    depends_on:
      - synthesizer

  - id: fix
    label: 修改简报
    agent_name: demo
    prompt: |
      根据审查意见逐条修改商机简报：

      1. 逐条回应每个审查意见，格式：「问题 N：{原文} → 修改为：{新方案/补充内容}」
      2. 【致命】和【严重】级别的问题必须实质性修改
      3. 【建议】级别逐一评估，合理则改
      4. 如需补充信息，搜索验证后再修改
      5. 输出修改后的完整简报
    expected_output: 修改后的完整商机简报 + 逐条修改说明
    timeout_seconds: 600
    depends_on:
      - reviewer

  - id: confirm
    label: 确认修改
    agent_name: demo
    prompt: |
      逐条对照审查意见确认修改结果：

      1. 每条审查问题标注状态：
         ✓ 已解决 — 修改到位，问题消除
         △ 部分解决 — 方向对了但不完整
         ✗ 未解决 — 没有实质性修改或改错了方向
      2. 对于 △ 和 ✗ 的项，说明具体差在哪里
      3. 检查是否引入了新问题

      确认结论：
      - 全部 ✓：输出「通过」
      - 存在 ✗：【致命/严重】问题未解决：输出「不通过：{未解决列表}」
    expected_output: 确认结论（通过 / 不通过 + 逐条确认状态）
    gate:
      type: review
    depends_on:
      - fix

max_total_seconds: 2400
