name: integration-test
description: 并行集成测试 — API测试+E2E测试并行编写运行 → 汇总去重 → 修复 → 再测(gate)。发现问题直接修，再测通过才放行。
workspace: demo

nodes:
  # ═══ Phase 1: 并行测试 ═══

  - id: api_tester
    label: API 集成测试
    agent_name: demo
    prompt: |
      你是 API 集成测试工程师。针对目标代码编写并运行 API 集成测试。

      ## 工作流程
      1. 分析代码中的 API 端点、请求处理、数据流
      2. 编写集成测试：覆盖正常请求、异常输入、边界条件、权限校验
      3. 运行测试，收集结果

      ## 测试覆盖
      - 所有端点的正常响应 (200/201)
      - 参数校验 (400/422)
      - 认证鉴权 (401/403)
      - 资源不存在 (404)
      - 响应体结构和字段类型
      - 数据库写入/读取正确性

      ## 输出
      ### 测试代码
      ```{语言}
      {完整测试代码}
      ```

      ### 测试结果
      | # | 测试名 | 状态 | 耗时 | 失败原因 |
      |---|--------|------|------|---------|
    expected_output: API 测试代码 + 测试结果表（直接输出，不要写入文件）
    timeout_seconds: 900
    depends_on: []

  - id: e2e_tester
    label: E2E 测试
    agent_name: demo
    prompt: |
      你是 E2E 测试工程师。针对目标应用编写并运行端到端测试。

      ## 适用性判断（第一步，必须在 2 分钟内完成）
      - 目标是否提供可启动的服务（Web 服务器、API 服务、桌面应用、移动端）？
      - 如果没有可启动的服务（如纯库模块、CLI 工具、脚本），直接输出「E2E 不适用」并说明原因，不要强行测试。
      - 如果适用，继续下面的流程。

      ## 工作流程
      1. 理解用户核心使用流程（注册→登录→核心操作→登出）
      2. 编写 E2E 测试：模拟真实用户操作路径
      3. 运行测试，收集结果

      ## 测试覆盖
      - 核心用户流程（happy path）
      - 异常流程（网络中断、超时、无效操作）
      - 跨页面/跨组件数据一致性
      - 关键 UI 交互（表单提交、列表加载、状态变更）

      ## 输出
      ### 测试代码
      ```{语言}
      {完整测试代码}
      ```

      ### 测试结果
      | # | 测试名 | 状态 | 耗时 | 失败原因 |
      |---|--------|------|------|---------|
    expected_output: E2E 测试代码 + 测试结果表（直接输出，不要写入文件）
    timeout_seconds: 900
    depends_on: []

  # ═══ Phase 2: 汇总去重 ═══

  - id: aggregator
    label: 汇总去重
    agent_name: demo
    prompt: |
      汇总 API 测试和 E2E 测试的结果，去重，留下需要修复的问题。

      ## 任务
      1. 合并两边的测试结果
      2. 去重：同一个 bug 导致多个测试失败 → 合并为一条
      3. 分类：代码 bug / 测试本身写错了 / 覆盖缺口
      4. 标注优先级：P0(功能阻断) / P1(逻辑错误) / P2(边界遗漏)

      ## 输出
      ### 测试总览
      | 类型 | 总数 | 通过 | 失败 | 通过率 |
      |------|------|------|------|--------|

      ### 需修复问题（去重后）
      | # | 优先级 | 分类 | 问题 | 来源(API/E2E) | 修复建议 |
      |---|--------|------|------|-------------|---------|

      ### 覆盖缺口
      （哪些关键路径没有被测试覆盖）
    expected_output: 汇总报告（测试总览 + 去重问题清单 + 覆盖缺口）
    timeout_seconds: 300
    depends_on:
      - api_tester
      - e2e_tester

  # ═══ Phase 3: 修复 ═══

  - id: fix
    label: 修复问题
    agent_name: demo
    prompt: |
      根据汇总报告逐条修复问题。

      ## 规则
      1. 代码 bug → 修代码
      2. 测试写错了 → 修测试
      3. 覆盖缺口 → 补充测试
      4. 每修一条输出：「问题 N [已修复]：{改动说明}」

      ## 输出
      逐条修复状态 + 修改后的代码
    expected_output: 逐条修复状态 + 修改后的代码
    timeout_seconds: 900
    depends_on:
      - aggregator

  # ═══ Phase 4: 再测 ═══

  - id: re_test
    label: 再测试
    agent_name: demo
    prompt: |
      重新运行全部测试，验证修复结果。

      ## 验证
      1. 运行之前失败的所有测试
      2. 运行新增的测试
      3. 确认没有引入新的失败（回归检查）

      ## 输出
      | # | 原问题 | 测试结果 | 状态 |
      |---|--------|---------|------|
      （✓ 通过 / ✗ 仍失败）

      重新测试结论：
      - 全部 ✓：输出「通过」
      - 存在 ✗ 或新增失败：输出「不通过：{仍失败的测试}」
    expected_output: 再测结论（通过 / 不通过 + 逐条测试结果）
    gate:
      type: review
    depends_on:
      - fix

max_total_seconds: 2400
