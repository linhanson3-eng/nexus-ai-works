name: code-audit
description: 代码审计 — 多维度深度审计（安全/静默失败/性能/合规）→ 修复 → 确认闭环。和 code-review 互补：review 看对不对，audit 看有没有隐藏的漏洞和风险。
workspace: demo

nodes:
  - id: auditor
    label: 代码审计
    agent_name: demo
    prompt: |
      你是资深代码审计师。对代码进行多维度深度审计，找出隐藏的问题——不是检查"写得对不对"，而是找"有什么隐患"。

      ## 审计维度

      ### 1. 安全
      - SQL/命令/模板注入、XSS、路径遍历
      - 认证授权绕过、硬编码凭据、不安全加密(MD5/SHA1)
      - CSRF/SSRF、反序列化风险

      ### 2. 静默失败
      - 被吞掉的异常(try/except: pass)、缺失错误处理
      - 错误的 fallback 逻辑、未处理异步错误
      - 超时缺失、重试逻辑缺陷、部分失败状态不一致

      ### 3. 性能陷阱
      - N+1 查询、无界查询/分页缺失
      - 资源泄露(连接/文件句柄/goroutine)、阻塞 I/O 在 hot path
      - 锁竞争/死锁风险、不必要的重复计算

      ### 4. 合规与数据
      - PII 泄露(日志/错误消息中打印敏感信息)
      - 数据明文传输/存储、输入验证边界
      - 第三方依赖风险(已知漏洞/license 冲突)

      ## 输出格式
      | # | 严重级别 | 维度 | 问题 | 位置(file:line) | 影响与攻击场景 | 修复方案 |
      |---|---------|------|------|----------------|-------------|---------|

      严重级别：🔴 CRITICAL / 🟠 HIGH / 🟡 MEDIUM / ⚪ LOW

      不要输出"代码写得不错"这种空话。只列问题。没发现就标注"未发现"。
    expected_output: 审计报告（逐条标注严重级别、维度、位置、影响、修复方案）
    timeout_seconds: 900
    depends_on: []

  - id: fix
    label: 修复审计问题
    agent_name: demo
    prompt: |
      根据审计报告逐条修复问题。

      ## 规则
      1. 先修 CRITICAL，再 HIGH，最后 MEDIUM。LOW 可改可不改
      2. 每修一条输出：「问题 N [已修复]：{file:line}，{改动说明}」
      3. 如果审计误报，标注「误报：{理由}」
      4. 修复一个问题的同时不要引入新问题
      5. 输出修改后的完整代码文件

      ## 输出
      逐条修复状态 + 修改后的代码
    expected_output: 逐条修复状态 + 修改后的完整代码
    timeout_seconds: 900
    depends_on:
      - auditor

  - id: confirm
    label: 确认修复
    agent_name: demo
    prompt: |
      逐条验证审计问题的修复结果。

      ## 验证
      1. CRITICAL 和 HIGH 逐一验证，MEDIUM 抽检 50%
      2. 确认修复没有引入新漏洞
      3. 标注：✓ 已修复 / △ 部分修复 / ✗ 未修复 / — 误报

      ## 输出
      | # | 原问题 | 严重级别 | 状态 | 验证说明 |
      |---|--------|---------|------|---------|

      确认结论：
      - CRITICAL 全部 ✓ 且 HIGH 全部 ✓：输出「通过」
      - 存在 ✗：输出「不通过：{未解决问题列表}」
    expected_output: 确认结论（通过 / 不通过 + 逐条验证状态）
    gate:
      type: review
    depends_on:
      - fix

max_total_seconds: 1800
