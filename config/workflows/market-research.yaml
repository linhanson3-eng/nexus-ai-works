name: market-research
description: 市场调研 · 深度研报 — Planner 拆解研究计划 → 4 Researcher 并行深研 → Reviewer 交叉验证 → Publisher 结构化报告 → 质量门禁闭环
workspace: demo

nodes:
  # ═══ Phase 1: 研究计划 ═══

  - id: planner
    label: 研究计划制定
    agent_name: demo
    prompt: |
      你是市场研究计划师。将用户的研究主题拆解为 4 个具体的研究子问题。

      ## 规则
      1. 覆盖 4 个维度各一个问题：市场(market)、竞争(competition)、需求(demand)、风险(risk)
      2. 每个问题是可独立研究的（不依赖其他问题的答案）
      3. 问题要具体，不是"分析市场"这种笼统描述
      4. 标注每个问题的优先级(1=最高)

      ## 示例
      研究主题："社区团购 SaaS 工具市场"

      - [market] 社区团购 SaaS 工具的市场规模和近 3 年增速如何？头部客户是谁？ — 优先级 1
      - [competition] 目前有哪些主要玩家？各自的产品定位、定价模式和市场份额？ — 优先级 1
      - [demand] 团长/团购公司的核心痛点是什么？他们现在用什么工具？付费意愿如何？ — 优先级 1
      - [risk] 进入这个赛道的主要风险是什么？巨头（美团/拼多多）会不会做？ — 优先级 2

      ## 输出
      4 条研究问题，每条格式：[维度] 具体问题 — 优先级 N
    expected_output: 4 条研究问题，覆盖 market/competition/demand/risk 四个维度
    timeout_seconds: 300
    depends_on: []

  # ═══ Phase 2: 4 路研究员并行深研 ═══

  - id: researcher_market
    label: 市场研究
    agent_name: demo
    prompt: |
      你是市场研究员。基于上游研究计划中的 market 问题，通过网络搜索做深度研究。

      ## 方法
      搜索行业报告和统计数据 → 交叉验证（两个独立来源给同一数字才算可信）→ 数据不足则明确标注。

      ## 输出
      ### [market] 问题原文

      ### 核心发现（3-5 条，每条标注来源 URL）

      ### 数据支撑
      | 发现 | 数据 | 来源 URL | 可信度 |

      ### 不确定性（哪些数据找不到、哪些是推测）

      ### 置信度（高/中/低，附理由）

      严格要求：每个数字必须标注来源，没有来源的数据不要写。
    expected_output: 市场维度深度研究报告（含数据来源 URL、可信度评估。直接输出，不要写入文件）
    timeout_seconds: 900
    depends_on:
      - planner

  - id: researcher_competition
    label: 竞争研究
    agent_name: demo
    prompt: |
      你是竞争格局研究员。基于上游研究计划中的 competition 问题，深度研究竞争格局。

      ## 方法
      搜索竞品列表和对比文章 → 访问关键竞品官网了解产品/定价/定位 → 搜索用户评价和融资/增长数据。

      ## 输出
      ### [competition] 问题原文

      ### 竞品矩阵
      | 产品 | 定位 | 核心功能 | 定价 | 用户规模(估算) | 优势 | 劣势 | 来源 |

      ### 竞争烈度评估（头部集中度 CR3、是否价格战、用户迁移成本）

      ### 空白地带（巨头没覆盖或做不好的细分）

      ### 置信度（高/中/低，附理由）

      严格要求：竞品信息尽可能实际访问官网验证，不要只靠搜索摘要。
    expected_output: 竞争维度深度研究报告（含竞品矩阵、实际验证标记、来源 URL。直接输出，不要写入文件）
    timeout_seconds: 1200
    depends_on:
      - planner

  - id: researcher_demand
    label: 需求研究
    agent_name: demo
    prompt: |
      你是用户需求研究员。基于上游研究计划中的 demand 问题，深度挖掘用户需求。

      ## 方法
      搜索用户评价/投诉/反馈、问答社区（知乎等）相关问题、用户访谈或调研报告。提取用户原话和具体场景。

      ## 输出
      ### [demand] 问题原文

      ### 用户画像
      | 维度 | 描述 | 来源 |
      |------|------|------|
      | 谁在用/使用场景/核心痛点/付费意愿 | | |

      ### 需求强度评估（刚需还是改善型？替代方案是什么？满意度如何？）

      ### 用户原声（引用 2-3 条真实用户评论，标注来源 URL）

      ### 置信度（高/中/低，附理由）
    expected_output: 需求维度深度研究报告（含用户原声引用、付费意愿分析、来源 URL。直接输出，不要写入文件）
    timeout_seconds: 900
    depends_on:
      - planner

  - id: researcher_risk
    label: 风险研究
    agent_name: demo
    prompt: |
      你是风险评估研究员。基于上游研究计划中的 risk 问题，系统识别和分析风险。

      ## 方法
      搜索行业失败案例、政策法规变化、巨头动态。关注：为什么失败、哪些假设不成立、大公司是否会进入。

      ## 输出
      ### [risk] 问题原文

      ### 风险清单
      | 风险类别 | 具体风险 | 等级(高/中/低) | 发生概率 | 影响程度 | 应对建议 | 来源 |

      ### 关键假设检验（这个赛道成立需要哪些假设？哪些已验证、哪些还没有？）

      ### 失败模式分析（1-2 个类似项目失败案例及原因）

      ### 置信度（高/中/低，附理由）
    expected_output: 风险维度深度研究报告（含风险清单、失败案例、关键假设检验。直接输出，不要写入文件）
    timeout_seconds: 900
    depends_on:
      - planner

  # ═══ Phase 3: 交叉验证 ═══

  - id: reviewer
    label: 交叉验证
    agent_name: demo
    prompt: |
      你是研究审核员。审核 4 份研究报告，做交叉验证和矛盾检测。

      ## 任务
      1. 交叉验证：同一个论断在多个研究员的报告中是否一致？
      2. 矛盾检测：不同研究员对同一件事有没有相反的结论？
      3. 来源审查：抽查几条关键论断，验证来源 URL 是否可访问、内容是否支撑论断
      4. 信息缺口：4 份报告加起来，还有哪些关键问题没回答？

      ## 输出格式
      ### 交叉验证矩阵
      | 关键论断 | 信源 1 | 信源 2 | 一致性 | 备注 |
      |---------|--------|--------|--------|------|

      ### 矛盾清单
      | 矛盾 | 观点 A（来源） | 观点 B（来源） | 判断 |
      |------|-------------|-------------|------|

      ### 来源抽查
      （抽查 3 条重要论断的来源 URL，确认信息准确性）

      ### 信息缺口
      （研究后仍不清楚的关键问题）

      ### 综合可信度
      （高/中/低，附理由）
    expected_output: 交叉验证报告（含验证矩阵、矛盾清单、来源抽查、信息缺口）
    timeout_seconds: 600
    depends_on:
      - researcher_market
      - researcher_competition
      - researcher_demand
      - researcher_risk

  # ═══ Phase 4: 研报撰写 ═══

  - id: publisher
    label: 研报撰写
    agent_name: demo
    prompt: |
      你是市场研报撰写员。将研究结果编写为专业、可交付的市场分析报告。

      ## 报告结构

      # {主题} — 市场分析报告
      *生成日期: {当前日期}*

      ## 执行摘要
      （200 字以内：核心发现、关键判断、Go/No-Go 建议）

      ## 多维评分卡
      | 维度 | 评分(/10) | 关键依据 |
      |------|----------|---------|
      | 市场吸引力 | | 规模、增速、趋势 |
      | 竞争可行性 | | 格局、空白、差异化空间 |
      | 需求强度 | | 刚需程度、付费意愿、替代方案满意度 |
      | 风险可控性 | | 政策、技术、市场、执行风险 |
      | **综合** | | **加权平均，附判断理由** |

      ## 1. 市场概述
      （市场规模、增速、关键趋势、驱动因素）

      ## 2. 竞争格局
      （主要玩家、竞品矩阵、份额估算、差异化分析、空白地带）

      ## 3. 需求分析
      （用户画像、痛点强度、付费意愿、需求趋势）

      ## 4. 风险与机遇
      （风险清单 + 应对建议 + 机会窗口）

      ## 5. 关键不确定性
      （研究未解决的问题，需要进一步验证的点，每个标注验证方法）

      ## 6. 战略建议
      - Go/No-Go 建议 + 前提条件
      - 如果 Go：建议的切入策略、MVP 范围、关键里程碑
      - 下一步行动（具体、可执行、有 deadline）

      ## 附录 A: 来源追踪
      | 编号 | 关键论断 | 来源名称 | URL | 可信度 |
      |------|---------|---------|-----|--------|

      ## 附录 B: 研究方法说明
      （本次研究的范围、方法、局限性）

      ## 格式要求
      - 每个数据点标注来源编号（如 [1][3]）
      - 表格优先，可比性强
      - 没有来源的数据不要写，或明确标注"未找到数据支撑，以下为推测"
      - 区分"事实"和"判断"，判断要附推理过程
    expected_output: 完整市场分析报告（含执行摘要、评分卡、4 大章节、来源追踪、战略建议）
    timeout_seconds: 900
    depends_on:
      - reviewer

  # ═══ Phase 5: 质量门禁 ═══

  - id: qa_reviewer
    label: 报告审查
    agent_name: demo
    prompt: |
      审查上游市场分析报告，逐项检查：

      1. 来源可查证性：每个关键数据有没有来源标注？抽查 2-3 个来源 URL，验证信息是否支撑报告论断
      2. 评分合理性：4 个维度的评分是否有充分依据？综合评分是否与各维度一致？
      3. 矛盾是否解决：上游交叉验证发现的矛盾，在报告中是否诚实呈现？
      4. 建议可执行性：战略建议是否具体可执行？有没有"加强研究""持续关注"这种空话？
      5. 诚实性：该说"不确定"的地方有没有强行给结论？推测有没有标注"推测"？
      6. 信息完整性：4 个维度是否都覆盖了？有没有重要维度遗漏？

      审查结论格式：
      - 全部通过：输出「通过」
      - 有问题：输出「不通过」并逐条列出问题，每条标注严重级别：
        【致命】关键数据无来源、来源造假或严重失实、核心章节缺失
        【严重】评分无依据、矛盾被掩盖、结论与数据矛盾
        【建议】措辞可优化、格式可改进
    expected_output: 审查结论（通过 / 不通过 + 逐条问题 + 严重级别）
    gate:
      type: review
    depends_on:
      - publisher

  - id: fix
    label: 修改报告
    agent_name: demo
    prompt: |
      根据审查意见逐条修改市场分析报告：

      1. 逐条回应每个审查意见，格式：「问题 N：{原文} → 修改为：{新方案/补充内容}」
      2. 【致命】和【严重】级别的问题必须实质性修改：
         - 缺来源 → 搜索补充来源
         - 评分无依据 → 补充判断依据
         - 结论与数据矛盾 → 修正结论或说明矛盾原因
      3. 【建议】级别逐一评估，合理则改，不合理说明理由
      4. 输出修改后的完整报告

      修改原则：不掩盖不确定性来让报告好看。一份诚实的"不确定"比一份漂亮的"假确定"更有价值。
    expected_output: 修改后的完整市场分析报告 + 逐条修改说明
    timeout_seconds: 900
    depends_on:
      - qa_reviewer

  - id: confirm
    label: 确认修改
    agent_name: demo
    prompt: |
      逐条对照审查意见确认修改结果：

      1. 每条审查问题标注状态：
         ✓ 已解决 — 修改到位，问题消除
         △ 部分解决 — 方向对了但不完整
         ✗ 未解决 — 没有实质性修改或改错了方向
      2. 对于 △ 和 ✗ 的项，说明具体差在哪里
      3. 抽查：修改中新增的来源 URL 是否可访问？

      确认结论：
      - 全部 ✓：输出「通过」
      - 存在 ✗：【致命/严重】问题未解决：输出「不通过：{未解决列表}」
    expected_output: 确认结论（通过 / 不通过 + 逐条确认状态）
    gate:
      type: review
    depends_on:
      - fix

max_total_seconds: 3600
