name: design-review-pipeline
description: 设计文档 → 审查 → 修改 → 确认 闭环。设计质量直接决定代码质量，审查门禁比代码审查更严格。
workspace: demo

nodes:
  - id: writer
    label: 撰写设计文档
    agent_name: demo
    prompt: |
      根据需求撰写详细设计文档，至少覆盖以下维度：

      1. 背景与目标：要解决什么问题，成功标准是什么
      2. 架构方案：整体架构图（文字描述）、模块划分、职责边界
      3. 接口设计：关键 API / 函数签名、数据模型、状态流转
      4. 技术选型：选型理由、备选方案对比、引入的风险
      5. 数据流：核心业务流程的时序/数据流描述
      6. 边界与异常：边界条件处理、异常路径、降级策略
      7. 非功能需求：性能指标、安全要求、可扩展性考虑

      要求：
      - 每个方案给出选择理由，不要只列结论
      - 标注不确定项和假设前提
      - 关键决策点标注风险等级（高/中/低）

      输出完整设计文档，不要省略。
    expected_output: 完整设计文档（含架构、接口、数据流、风险标注）
    timeout_seconds: 900
    depends_on: []

  - id: reviewer
    label: 设计审查
    agent_name: demo
    prompt: |
      审查上游设计文档，逐维度检查：

      1. 完整性：是否覆盖了所有 7 个维度？缺了什么？
      2. 正确性：架构方案是否合理？接口设计是否有逻辑漏洞？
      3. 可行性：技术选型是否可实现？有没有已知的坑？
      4. 一致性：模块之间接口是否对齐？数据流是否闭环？
      5. 风险：是否有未标注的高风险决策？降级策略是否足够？
      6. 过度设计：有没有不必要的复杂度？能否更简单？

      审查结论格式：
      - 如果全部通过，输出「通过」
      - 如果有问题，输出「不通过」并逐条列出问题，每条标注严重级别：
        【致命】方案不可行或会导致系统性风险
        【严重】逻辑漏洞、接口不一致、缺少关键维度
        【建议】可以更好但不阻塞

      致命和严重问题未解决前，不得通过。
    expected_output: 审查结论（通过 / 不通过 + 逐条问题 + 严重级别）
    gate:
      type: review
    depends_on:
      - writer

  - id: fix
    label: 修改设计文档
    agent_name: demo
    prompt: |
      根据审查意见逐条修改设计文档：

      1. 逐条回应每个审查意见，格式：「问题 N：{原文} → 修改为：{新方案/补充内容}」
      2. 【致命】和【严重】级别的问题必须实质性修改，不能只改措辞
      3. 【建议】级别的问题逐一评估，合理则改，不合理说明理由
      4. 输出修改后的完整设计文档

      修改原则：
      - 不降低设计质量来规避审查
      - 不确定的项标注「待确认」并说明阻塞条件
      - 方案对比用表格，一目了然
    expected_output: 修改后的完整设计文档 + 逐条修改说明
    timeout_seconds: 900
    depends_on:
      - reviewer

  - id: confirm
    label: 确认修改
    agent_name: demo
    prompt: |
      逐条对照审查意见确认修改结果：

      1. 每条审查问题标注状态：
         ✓ 已解决 — 修改到位，问题消除
         △ 部分解决 — 方向对了但不完整
         ✗ 未解决 — 没有实质性修改或改错了方向
      2. 对于 △ 和 ✗ 的项，说明具体差在哪里
      3. 检查是否引入了新问题

      确认结论：
      - 全部 ✓：输出「通过」
      - 存在 ✗：【致命/严重】问题未解决：输出「不通过：{未解决列表}」
    expected_output: 确认结论（通过 / 不通过 + 逐条确认状态）
    gate:
      type: review
    depends_on:
      - fix

max_total_seconds: 2400
