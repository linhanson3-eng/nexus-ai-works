name: user-acceptance-test
description: 用户验收测试 — 双线并行验证（盲测+经验测试）→ 去重 → 修复 → 确认闭环。和集成测试互补：集成测试看技术正确性，UAT 看用户能不能完成任务。
workspace: demo

nodes:
  # ═══ Phase 1: 双线并行验证 ═══

  - id: verify_a
    label: 盲测验证
    agent_name: demo
    prompt: |
      你是首次使用这个产品的真实用户。你对产品的技术实现一无所知，只知道它应该帮你完成某个任务。

      ## 你的角色
      你是一个普通用户，不是开发者。不要分析代码、不要看技术架构、不要推理"这个功能是怎么实现的"。
      你只关心：打开产品 → 尝试完成任务 → 能不能做到？

      ## 操作方式
      - Web 应用：用 Playwright 打开浏览器，模拟真实用户操作（点击、填表、导航）
      - API 服务：用 curl/web_fetch 调用端点，模拟真实调用场景
      - CLI 工具：用 bash 执行命令，模拟真实使用
      - 移动端/桌面端：用对应工具操作

      ## 验证过程
      1. 打开产品
      2. 尝试完成验收标准中的每一个用户目标
      3. 记录每一步的操作意图和实际结果
      4. 不要试图"测试边界"或"找 bug"——你就是来用产品的

      ## 记录重点
      - 操作是否直觉（不用思考就知道下一步）
      - 是否有卡住或困惑的时刻
      - 错误提示是否清晰可理解
      - 反馈是否及时
      - 最终是否达成了用户目标

      ## 输出
      ### 用户旅程记录
      | # | 用户目标 | 操作步骤 | 预期结果 | 实际结果 | 是否直觉 | 备注 |
      |---|---------|---------|---------|---------|---------|------|

      ### 体验问题
      | # | 问题 | 严重程度 | 影响 |
      |---|------|---------|------|
      （严重程度：阻断 / 困惑 / 不适）

      ### 验收结论
      - 所有目标达成且体验流畅：输出「通过」
      - 有目标未达成或严重体验问题：输出「不通过：{具体问题}」
    expected_output: 用户旅程记录 + 体验问题 + 验收结论（直接输出，不要写入文件）
    timeout_seconds: 900
    depends_on: []

  - id: verify_b
    label: 经验测试
    agent_name: demo
    prompt: |
      你是资深 QA 测试专家。你知道产品的验收标准，但不知道代码实现细节。
      从测试专家的角度系统性地验证产品。

      ## 你的角色
      你有丰富的测试经验，擅长发现用户容易忽略的问题：边界条件、异常路径、并发问题、
      状态不一致、权限漏洞等。但你不知道代码是怎么写的——只能通过实际操作来验证。

      ## 测试维度

      ### 1. 正常路径验证
      按验收标准逐条验证每个用户目标的达成情况。

      ### 2. 边界条件
      - 空输入、超长输入、特殊字符（emoji、unicode、SQL/HTML 标签）
      - 数值边界（0、负数、超大值、小数精度）
      - 列表边界（空列表、单条、大量条目）

      ### 3. 异常路径
      - 网络中断/恢复时的行为
      - 操作超时
      - 权限不足时的提示
      - 并发操作（快速重复点击、同时操作同一资源）
      - 非预期操作顺序（跳过步骤、回退、刷新）

      ### 4. 体验评估
      - 操作完成需要的步骤数（是否合理）
      - 加载/响应时间感知
      - 错误提示的清晰度和可操作性
      - 成功反馈的明确性

      ## 输出
      ### 验证结果
      | # | 验收标准 | 测试步骤 | 预期 | 实际 | 通过 |
      |---|---------|---------|------|------|------|

      ### 发现的问题
      | # | 严重度 | 维度 | 问题描述 | 复现步骤 | 建议修复 |
      |---|--------|------|---------|---------|---------|

      严重度：P0(功能阻断) / P1(逻辑错误) / P2(体验问题)

      ### 测试结论
      - P0 全部通过且 P1 ≤ 2 个：输出「通过」
      - 存在 P0 或 P1 > 2 个：输出「不通过：{问题摘要}」
    expected_output: 验证结果表 + 问题清单 + 测试结论（直接输出，不要写入文件）
    timeout_seconds: 900
    depends_on: []

  # ═══ Phase 2: 汇总去重 ═══

  - id: aggregator
    label: 汇总去重
    agent_name: demo
    prompt: |
      汇总盲测和 QA 测试两路验证结果，去重合并，产出统一的问题清单。

      ## 任务
      1. 合并 A 线（用户视角）和 B 线（QA 视角）的所有问题
      2. 去重：同一个根因导致两边都报 → 合并为一条，标注来源（A/B/双线）
      3. 统一严重度分级

      ## 严重度定义
      | 级别 | 定义 | 示例 |
      |------|------|------|
      | P0 阻断 | 用户核心目标无法完成 | 注册失败、支付崩溃、数据丢失 |
      | P1 缺陷 | 功能可用但结果错误 | 数据显示不对、权限判断有误 |
      | P2 体验 | 能用但有摩擦 | 步骤太多、提示不清、加载慢 |

      ## 输出
      ### 问题总览
      | 来源 | 发现问题数 | P0 | P1 | P2 |
      |------|-----------|----|----|-----|

      ### 去重后问题清单
      | # | 优先级 | 来源 | 问题描述 | 影响 | 修复建议 |
      |---|--------|------|---------|------|---------|

      ### 覆盖分析
      - 哪些验收标准被覆盖了（✓）
      - 哪些验收标准没有被充分测试（△）
      - 建议补充的验证点
    expected_output: 去重问题清单 + 覆盖分析
    timeout_seconds: 300
    depends_on:
      - verify_a
      - verify_b

  # ═══ Phase 3: 修复 ═══

  - id: fix
    label: 修复验收问题
    agent_name: demo
    prompt: |
      根据去重后的问题清单，逐条修复。

      ## 规则
      1. P0 必须全部修复，P1 尽量修，P2 判断性价比
      2. 每修一条输出：「问题 N [已修复]：{改动说明}」
      3. 如果问题不在代码层面（如产品设计问题），标注「需产品决策：{说明}」
      4. 修复一个问题时不要引入新问题
      5. 修复后输出修改过的完整文件

      ## 输出
      逐条修复状态 + 修改后的代码
    expected_output: 逐条修复状态 + 修改后的完整代码
    timeout_seconds: 900
    depends_on:
      - aggregator

  # ═══ Phase 4: 确认 ═══

  - id: confirm
    label: 确认修复
    agent_name: demo
    prompt: |
      逐条验证修复结果，确保用户验收通过。

      ## 验证流程
      1. 逐一检查每一条 P0 和 P1 问题的修复结果
      2. 对已修复的问题，模拟用户操作复测确认
      3. 检查修复是否引入新的体验退化

      ## 验收标准
      - P0 全部修复 → 必须通过
      - P1 全部修复或有明确的产品决策记录 → 可以通过
      - P2 不阻塞验收

      ## 输出
      | # | 原问题 | 优先级 | 修复状态 | 复测结果 | 备注 |
      |---|--------|--------|---------|---------|------|

      修复状态：已修复 / 部分修复 / 需产品决策 / 未修复

      确认结论：
      - P0 全部已修复且 P1 状态明确：输出「通过」
      - P0 未修复或 P1 无明确结论：输出「不通过：{未解决问题}」
    expected_output: 确认结论（通过 / 不通过 + 逐条修复验证）
    gate:
      type: review
    depends_on:
      - fix

max_total_seconds: 2400
