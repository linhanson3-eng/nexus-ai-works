name: github-hunter
description: GitHub 搬运工 — 全平台搜索开源项目 → 评估适配 → 人决策 → 克隆 → 改造 → 封装为 Nexus 方案包 → 安装验证。从开源项目到方案市场的一站式产线。
workspace: demo

nodes:
  # ═══ Phase 1: 搜索 ═══

  - id: hunter
    label: 搜索候选项目
    agent_name: demo
    prompt: |
      你是开源项目猎手。根据需求，在 GitHub/GitLab/Codeberg 等平台搜索候选开源项目。

      ## 搜索策略
      1. 多平台搜：GitHub 为主，GitLab/Codeberg 补充
      2. 多角度搜：需求关键词 + 技术栈关键词 + 功能描述词
      3. 每个平台至少返回 3 个候选

      ## 硬性过滤
      - 技术栈：必须是 Python 3.11+ / TypeScript / Go（ai-factory 支持的语言）
      - 许可证：MIT / Apache 2.0 / BSD / GPL 兼容
      - 活跃度：最近 2 年内有更新，stars ≥ 10
      - 完整性：必须有 README，有基本的安装说明

      ## 输出
      每个候选项目的关键信息：

      | # | 项目名 | URL | 平台 | Stars | License | 技术栈 | 最后更新 | 简介 |
      |---|--------|-----|------|-------|---------|--------|---------|------|

      备注栏补充：
      - 代码规模（文件数/行数）
      - 是否有 CLI 入口
      - 主要依赖项
    expected_output: 候选项目清单（表格 + 备注信息，直接输出不要写入文件）
    timeout_seconds: 900
    depends_on: []

  # ═══ Phase 2: 评估 ═══

  - id: analyzer
    label: 评估分析
    agent_name: demo
    prompt: |
      你是技术评估专家。对每个候选项目进行多维度评估，判断是否适合搬运到 ai-factory。

      ## 评估维度

      ### 1. 技术栈匹配度（权重 30%）
      - 语言版本兼容性（Python 3.11+ / TS 5+ / Go 1.21+）
      - 依赖复杂度：依赖越少越干净越好
      - 入口形态：有 CLI/API/server 入口比纯库更容易适配

      ### 2. 代码质量（权重 25%）
      - 是否有测试、测试覆盖率
      - 代码组织的合理性
      - 是否有明显的安全风险

      ### 3. 许可证合规（权重 15%）
      - 许可证是否明确
      - 与 ai-factory 许可证（待定）的兼容性
      - 依赖的许可证传染风险（GPL 查 copyleft）

      ### 4. 维护健康度（权重 15%）
      - 最近 6 个月是否有提交
      - Issue/PR 响应速度
      - 核心维护者数量

      ### 5. 适配工作量（权重 10%）
      - 目录结构调整的复杂程度
      - 是否需要剥离无关代码
      - Agent 配置的工作量（低/中/高）

      ### 6. 市场价值（权重 5%）
      - 解决的问题是否有普遍需求
      - 是否能和 ai-factory 现有模板产生协同

      ## 输出
      ### 评估总表
      | # | 项目 | 技术栈 | 代码质量 | 许可证 | 活跃度 | 适配 | 市场 | 总分 |
      |---|------|--------|---------|--------|--------|------|------|------|
      （每项 1-5 分，加权计算总分）

      ### 适配风险评估
      | # | 项目 | 风险点 | 等级 | 缓解方案 |
      |---|------|--------|------|---------|

      ### 推荐结论
      - 推荐搬运：
      - 可选：
      - 不建议：
    expected_output: 评估报告（评分表 + 风险评估 + 推荐结论，直接输出不要写入文件）
    timeout_seconds: 900
    depends_on:
      - hunter

  # ═══ Phase 3: 决策 ═══

  - id: decider
    label: 决策确认
    agent_name: demo
    prompt: |
      汇总评估结果，给出最终推荐并暂停等待决策。

      ## 输出
      ### 推荐排序
      | 排名 | 项目 | 总分 | 亮点 | 主要风险 | 建议 |
      |------|------|------|------|---------|------|

      ### 最终建议
      逐一说明每个项目是否值得搬运及其理由。

      ### 决策结论
      - 如果至少有一个项目值得搬运，输出「通过」。如果全部不建议，输出「不通过：无明显适配项目」。

      ## 等待决策
      请查看上述评估报告，选择要搬运的项目（可多选），也可以选择全部跳过。
    expected_output: 推荐排序 + 最终建议 + 决策结论
    gate:
      type: review
    depends_on:
      - analyzer

  # ═══ Phase 4: 克隆 ═══

  - id: cloner
    label: 克隆项目
    agent_name: demo
    prompt: |
      将选中的开源项目克隆到当前工作区。

      ## 操作步骤
      1. `git clone <项目URL> <项目名>/` 到工作区根目录
      2. 确认克隆成功：检查文件数量和目录结构
      3. 记录项目基本信息

      ## 注意事项
      - 如果工作区已有同名目录 → 先备份或重命名
      - 不要克隆 .github/ .gitlab-ci.yml 等 CI 配置
      - 保留 .git 以便后续追踪上游更新

      ## 输出
      - 项目名、版本（tag/commit hash）
      - 文件数量、代码行数
      - 目录结构（tree -L 2）
      - 克隆状态（成功/失败）
    expected_output: 克隆结果 + 项目基本信息 + 目录结构
    timeout_seconds: 300
    depends_on:
      - decider

  # ═══ Phase 5: 改造适配 ═══

  - id: adapter
    label: 改造适配
    agent_name: demo
    prompt: |
      将克隆的开源项目改造为 ai-factory 兼容的格式，确保安装后可以直接运行。

      ## 改造清单

      ### 1. 注入 CLAUDE.md
      在项目根目录创建/更新 CLAUDE.md，包含：
      - 项目用途和功能概述
      - 启动方式和入口
      - 依赖说明
      - 关键配置项

      ### 2. 生成 Agent 配置
      在 `agents/` 目录下生成对应的 agent yaml 文件：
      - 入口命令（CLI / server）
      - 模型配置和 fallback
      - 工作区路径
      - timeout 和其他参数

      ### 3. 入口适配
      - 确保有可执行的 `entrypoint.py` 或 CLI 入口
      - 没有就创建一个薄封装层
      - 验证 `python3 entrypoint.py --help` 可执行

      ### 4. 清理
      - 删除 .github/ .circleci/ 等 CI 目录
      - 删除不相关的示例/废弃代码（保留 docs 下的说明）
      - 删除 hardcoded 的 API key、token、密码

      ### 5. 合规
      - 确认 LICENSE 文件存在
      - 检查没有 copyleft 传染风险
      - 扫描无硬编码密钥残留

      ## 输出
      | # | 改造项 | 状态 | 说明 |
      |---|--------|------|------|

      改造完成后输出完整的项目目录结构。
    expected_output: 改造清单逐项状态 + 改造后的目录结构
    timeout_seconds: 900
    depends_on:
      - cloner

  # ═══ Phase 6: 封装 ═══

  - id: packager
    label: 封装 Nexus 包
    agent_name: demo
    prompt: |
      将改造后的项目封装为标准 .nexus 包。

      ## 封装流程
      1. 确认改造后的目录结构符合 Nexus 包规范：
         - nexus.yaml（清单：名称、版本、来源、描述、入口）
         - agents/*.yaml（Agent 配置）
         - CLAUDE.md（使用说明）
      2. 如果有额外的配置或模板，一并打包
      3. 生成版本号（基于上游版本 + adapter 后缀，如 v1.2.3+nexus.1）
      4. 敏感信息扫描：确保没有 API key、token、密码残留在包里
      5. 记录来源信息：原始 repo URL、commit hash、许可证

      ## 输出
      ### 包清单
      - 包名和版本
      - 原始来源（repo URL + commit）
      - 许可证
      - 包含的 Agent 列表
      - 包大小

      ### 完整性检查
      | 检查项 | 状态 | 备注 |
      |--------|------|------|

      ### 敏感信息检查
      扫描结果：是否安全，无泄露风险
    expected_output: 包清单 + 完整性检查 + 敏感信息扫描
    timeout_seconds: 600
    depends_on:
      - adapter

  # ═══ Phase 7: 验证 ═══

  - id: verify
    label: 安装验证
    agent_name: demo
    prompt: |
      模拟用户安装流程，验证 Nexus 包可以正常安装和使用。

      ## 验证流程
      1. 在临时工作区安装 .nexus 包
      2. 验证 Agent 配置正确加载
      3. 验证 `entrypoint.py` 可正常运行
      4. 验证核心功能通路（至少跑通一个基础流程）
      5. 验证 CLAUDE.md 内容完整

      ## 输出
      | # | 验证项 | 结果 | 备注 |
      |---|--------|------|------|

      验证结论：
      - 安装后能直接使用，核心功能正常：输出「通过」
      - 有问题：输出「不通过：{问题列表}」
    expected_output: 安装验证报告（通过/不通过 + 逐项验证结果）
    gate:
      type: review
    depends_on:
      - packager

max_total_seconds: 3600
